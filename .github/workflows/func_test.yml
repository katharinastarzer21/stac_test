name: Functional Tests (STAC)

on:
  schedule:
    - cron: "0 2 * * *"   # nightly at 02:00 UTC
  push:
    branches:
      - main
    paths:
      - "scripts/test_stac_functional.py"
      - "scripts/conftest.py"
  workflow_dispatch:

jobs:
  functional-prod:
    name: Functional (prod)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests prometheus-client pytest

      - name: Configure environment
        run: |
          echo "PYTHONPATH=$GITHUB_WORKSPACE"                              >> $GITHUB_ENV
          echo "STAC_URL=https://stac.eodc.eu/api/v1"                     >> $GITHUB_ENV
          echo "E2E_ENV=prod"                                              >> $GITHUB_ENV
          echo "PUSHGATEWAY_URL=${{ secrets.PUSHGATEWAY_ENDPOINT }}"      >> $GITHUB_ENV
          echo "PUSHGATEWAY_USERNAME=${{ secrets.PUSHGATEWAY_USERNAME }}"  >> $GITHUB_ENV
          echo "PUSHGATEWAY_PASSWORD=${{ secrets.PUSHGATEWAY_PASSWORD }}"  >> $GITHUB_ENV
          echo "INGEST_URL=${{ secrets.INGEST_URL }}"                       >> $GITHUB_ENV
          echo "INGEST_USER=${{ secrets.INGEST_USER }}"                     >> $GITHUB_ENV
          echo "INGEST_PASSWORD=${{ secrets.INGEST_PASSWORD }}"             >> $GITHUB_ENV

      - name: Run functional tests
        run: pytest scripts/test_stac_functional.py -v --tb=short

  functional-dev:
    name: Functional (dev)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests prometheus-client pytest

      - name: Configure environment
        run: |
          echo "PYTHONPATH=$GITHUB_WORKSPACE"                              >> $GITHUB_ENV
          echo "STAC_URL=https://dev.stac.eodc.eu/api/v1"                 >> $GITHUB_ENV
          echo "E2E_ENV=dev"                                               >> $GITHUB_ENV
          echo "PUSHGATEWAY_URL=${{ secrets.PUSHGATEWAY_ENDPOINT }}"      >> $GITHUB_ENV
          echo "PUSHGATEWAY_USERNAME=${{ secrets.PUSHGATEWAY_USERNAME }}"  >> $GITHUB_ENV
          echo "PUSHGATEWAY_PASSWORD=${{ secrets.PUSHGATEWAY_PASSWORD }}"  >> $GITHUB_ENV
          echo "INGEST_URL=${{ secrets.INGEST_URL }}"                       >> $GITHUB_ENV
          echo "INGEST_USER=${{ secrets.INGEST_USER }}"                     >> $GITHUB_ENV
          echo "INGEST_PASSWORD=${{ secrets.INGEST_PASSWORD }}"             >> $GITHUB_ENV

      - name: Run functional tests
        run: pytest scripts/test_stac_functional.py -v --tb=short
